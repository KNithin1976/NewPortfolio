<!DOCTYPE html>

<head>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #020617;
      position: sticky;
      top: 0;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    section {
      padding: 60px 40px;
      min-height: 100vh;
    }

    h2 {
      margin-bottom: 20px;
      border-bottom: 2px solid #38bdf8;
      display: inline-block;
      padding-bottom: 5px;
    }

    .social-icons {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .social-icons a {
      color: white;
      font-size: 30px;
      transition: 0.3s;
    }

    .social-icons a:hover {
      color: #38bdf8;
      transform: scale(1.2);
    }

    .card {
      background: #020617;
      padding: 20px;
      border-radius: 10px;
      margin: 10px 0;
    }

    .profile-img {
      width:150px;
      height:auto;
      border-radius:50%;
      float:left;
      margin-right:20px;
    }
  </style>
</head>
